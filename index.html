<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0c0a07">
<title>Expediente Whateley — Caso Blackmoor, 1889</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --ink:#e9ddc4; --paper:#ece2cc; --paper2:#ddcfa8;
 --brown:#0c0a07; --brown2:#1a1410; --gold:#c79a3e; --gold-soft:#e3b85a;
 --oxblood:#7c1f1a; --green:#3a4632;
}
html,body{background:#0c0a07}
body{font-family:'Crimson Text',Georgia,serif;color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:clip}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:#0c0a07}

/* ---------- shared ---------- */
.view{display:none}
.view.on{display:block;animation:fade .5s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.serif{font-family:'Cormorant Garamond',serif}
.hand{font-family:'Caveat',cursive}

/* candle / dust ambience */
.dust{position:absolute;inset:0;pointer-events:none;z-index:6;opacity:.5;
 background-image:radial-gradient(1.5px 1.5px at 20% 30%,rgba(231,210,160,.5),transparent),radial-gradient(1.5px 1.5px at 70% 60%,rgba(231,210,160,.4),transparent),radial-gradient(1px 1px at 45% 80%,rgba(231,210,160,.4),transparent),radial-gradient(1px 1px at 85% 25%,rgba(231,210,160,.35),transparent);
 animation:drift 14s linear infinite}
@keyframes drift{from{transform:translateY(0)}to{transform:translateY(-26px)}}

/* ---------- ENTRY (the table) ---------- */
#entry{position:relative;min-height:100vh}
.mesa-wrap{position:relative;width:100%}
.mesa{display:block;width:100%;height:auto}
.entry-top{position:absolute;top:0;left:0;right:0;z-index:8;padding:16px 18px 30px;
 background:linear-gradient(180deg,rgba(8,6,4,.9),rgba(8,6,4,.55) 60%,transparent);text-align:center}
.entry-kicker{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);font-weight:600}
.entry-line{font-size:12.5px;color:#bdae8c;margin-top:7px;line-height:1.5;font-style:italic;padding:0 6px}
.lang{display:flex;gap:0;justify-content:center;margin-top:11px}
.lang button{font-family:'Cormorant Garamond',serif;font-size:12.5px;font-weight:700;letter-spacing:1.5px;color:#8a7c5c;background:none;border:none;padding:3px 11px;cursor:pointer}
.lang button.on{color:var(--gold-soft)}
.lang .sep{color:#5a4f3a;align-self:center}

/* hotspots over the table objects */
.hot{position:absolute;cursor:pointer;z-index:7;border:none;background:transparent;padding:0}
.hot .halo{position:absolute;inset:-6% -8%;border-radius:50%;
 background:radial-gradient(ellipse,rgba(231,180,90,.34),rgba(231,180,90,.07) 55%,transparent 72%);
 animation:breathe 3.4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.55;transform:scale(.96)}50%{opacity:1;transform:scale(1.06)}}
.hot .tag{position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap;
 font-family:'Cormorant Garamond',serif;font-weight:700;font-size:13px;letter-spacing:1.6px;
 color:#f0e3bf;text-shadow:0 2px 8px #000,0 0 12px rgba(0,0,0,.9);text-transform:uppercase}
.hot .tag.below{top:100%;margin-top:2px}
.hot .tag.above{bottom:100%;margin-bottom:2px}
.hot:active{transform:scale(.97)}
.hot.decreto{left:22%;top:24%;width:56%;height:17%}
.hot.decreto .tag{top:-6px}
.hot.informe{left:24%;top:40%;width:54%;height:26%}
.hot.archivo{left:25%;top:72%;width:52%;height:23%}
.hot .lock{position:absolute;right:8%;top:6%;width:24px;height:24px;border-radius:50%;
 background:var(--oxblood);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px #000}
.hot.done .lock{background:var(--gold)}
.hot .lock svg{width:13px;height:13px}

/* edge vignette on entry */
.vig{position:absolute;inset:0;z-index:5;pointer-events:none;
 box-shadow:inset 0 0 120px 40px rgba(8,6,4,.95)}

/* ---------- DOCUMENT VIEWS ---------- */
.doc{min-height:100vh;padding:0 0 60px}
.docbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;
 padding:13px 16px;background:rgba(12,10,7,.93);border-bottom:1px solid #2a2114;backdrop-filter:blur(3px)}
.back{display:flex;align-items:center;gap:6px;font-family:'Cormorant Garamond',serif;font-size:13px;
 font-weight:700;letter-spacing:1px;color:var(--gold-soft);background:none;border:none;cursor:pointer}
.back svg{width:15px;height:15px}
.docbar .dt{flex:1;text-align:right;font-family:'Cormorant Garamond',serif;font-size:13px;
 letter-spacing:2px;text-transform:uppercase;color:#7a6c4c}

/* parchment sheet */
.sheet{margin:20px 14px;padding:30px 24px 36px;position:relative;border-radius:3px;
 background:linear-gradient(160deg,#efe6cf,#e2d4ac 55%,#d3c191);
 color:#2a2014;box-shadow:0 14px 40px rgba(0,0,0,.7),inset 0 0 70px rgba(120,86,40,.28);
 background-blend-mode:multiply}
.sheet::before{content:"";position:absolute;inset:0;border-radius:3px;pointer-events:none;
 box-shadow:inset 0 0 38px rgba(70,48,20,.5);
 background-image:radial-gradient(circle at 14% 12%,rgba(110,80,38,.22),transparent 26%),radial-gradient(circle at 88% 84%,rgba(90,62,28,.26),transparent 30%)}
.sheet>*{position:relative}
.crest{text-align:center;margin-bottom:6px}
.crest svg{width:46px;height:46px;color:#7a5a22}
.kicker{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;
 font-size:14px;color:#6a4f24;letter-spacing:.5px}
.dtitle{text-align:center;font-family:'Cormorant Garamond',serif;font-weight:700;
 font-size:27px;line-height:1.15;margin:5px 0 3px;color:#241a0e}
.dsub{text-align:center;font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:2px;
 text-transform:uppercase;color:#7a5a2e}
.rule{height:1px;margin:16px auto;width:74%;background:linear-gradient(90deg,transparent,#8a6a32,transparent)}
.sheet p{font-size:16.5px;line-height:1.66;margin:11px 0;color:#33271680}
.sheet p{color:#312614}
.sheet p.indent{text-indent:18px}
.sign{text-align:right;margin-top:20px}
.sign .nm{font-family:'Caveat',cursive;font-size:34px;color:#5a1a14;line-height:1}
.sign .rl{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:2px;
 text-transform:uppercase;color:#7a5a2e;margin-top:2px}

/* highlighted key phrase box */
.keybox{margin:22px 4px 6px;padding:16px 18px;text-align:center;border:1.5px solid #9c3a2a;
 background:rgba(150,40,28,.1);border-radius:2px;position:relative}
.keybox .lbl{font-family:'Cormorant Garamond',serif;font-size:10.5px;letter-spacing:3px;
 text-transform:uppercase;color:#8a3024;margin-bottom:6px}
.keybox .phrase{font-family:'Cormorant Garamond',serif;font-weight:700;font-style:italic;
 font-size:20px;line-height:1.3;color:#6e1d16}
.hl{font-weight:700;color:#7c1f1a;font-style:normal;background:rgba(160,50,32,.16);
 padding:0 4px;border-radius:2px}
.hl-num{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.18em;color:#7c1f1a;
 letter-spacing:1px;border-bottom:2px solid #9c3a2a;padding:0 3px}

/* wax seal */
.wax{width:74px;height:74px;margin:18px auto 0;border-radius:50%;
 background:radial-gradient(circle at 38% 34%,#a8362a,#6e1812 70%,#4a0f0b);
 display:flex;align-items:center;justify-content:center;
 box-shadow:0 6px 16px rgba(0,0,0,.5),inset 0 -4px 10px rgba(0,0,0,.5);transform:rotate(-8deg)}
.wax svg{width:38px;height:38px;color:#e9c089;opacity:.92}

/* report sections */
.report .seg{margin:18px 0}
.report .sh{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:18px;
 color:#3a2a12;letter-spacing:.5px;margin-bottom:3px}
.report .sh::before{content:"§ ";color:#9a7838}
.report .seg.emph p{font-style:italic;color:#5a2418}
.closing{margin:22px 4px 0;padding:15px 16px;text-align:center;border-top:1px solid #9a7838;
 border-bottom:1px solid #9a7838;font-family:'Cormorant Garamond',serif;font-style:italic;
 font-size:17.5px;line-height:1.4;color:#5a2418}

/* ---------- ARCHIVO / COFRE ---------- */
.arch{min-height:100vh;padding:0 0 60px}
.arch-inner{padding:8px 18px 0;text-align:center}
.arch h2{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:25px;color:#e9ddc4;margin-top:6px}
.arch .note{font-size:13.5px;color:#9a8c68;line-height:1.55;margin:9px 4px 0;font-style:italic}
.cofre-stage{position:relative;margin:14px auto 0;width:100%;max-width:380px}
.cofre-img{display:block;width:100%;height:auto;border-radius:4px;filter:brightness(.92)}
.cofre-stage.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
.cofre-stage.opened .cofre-img{filter:brightness(1.08) saturate(1.1)}
.glowburst{position:absolute;inset:0;border-radius:4px;pointer-events:none;opacity:0;
 background:radial-gradient(ellipse at 50% 42%,rgba(231,184,90,.85),transparent 60%)}
.cofre-stage.opened .glowburst{animation:burst 1.3s ease}
@keyframes burst{0%{opacity:0}40%{opacity:1}100%{opacity:0}}

/* symbol row */
.symrow{display:flex;justify-content:center;gap:9px;margin:16px 0 4px}
.sym{width:50px;height:50px;border-radius:9px;border:1.5px solid #5a4322;
 background:linear-gradient(160deg,#241c10,#15100a);display:flex;align-items:center;justify-content:center;
 cursor:pointer;transition:transform .12s,box-shadow .25s,border-color .25s;padding:0}
.sym svg{width:26px;height:26px;color:#9a8048;transition:color .2s}
.sym:active{transform:scale(.9)}
.sym.lit{border-color:var(--gold);box-shadow:0 0 16px rgba(199,154,62,.7),inset 0 0 12px rgba(199,154,62,.4)}
.sym.lit svg{color:var(--gold-soft)}
.seqdots{display:flex;justify-content:center;gap:7px;margin-top:12px;height:10px}
.seqdots i{width:9px;height:9px;border-radius:50%;background:#2e2616;border:1px solid #4a3a1e;display:block}
.seqdots i.fill{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(199,154,62,.7)}
.archmsg{min-height:20px;margin-top:13px;font-family:'Cormorant Garamond',serif;font-size:14.5px;
 letter-spacing:.5px;font-style:italic}
.archmsg.err{color:#c25a4a}
.archmsg.ok{color:var(--gold-soft)}
.cofre-reset{margin-top:10px;font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:1.5px;
 text-transform:uppercase;color:#8a7c5c;background:none;border:1px solid #3a3018;border-radius:7px;
 padding:8px 16px;cursor:pointer}

/* unlocked content */
.reveal{display:none}
.reveal.on{display:block;animation:fade .7s ease}
.letter{margin:20px 14px;padding:28px 22px 32px;border-radius:3px;position:relative;
 background:linear-gradient(155deg,#e7dcc0,#d8c79c 60%,#c9b485);color:#2a2014;
 box-shadow:0 14px 40px rgba(0,0,0,.7),inset 0 0 60px rgba(110,78,36,.34)}
.letter::before{content:"";position:absolute;inset:0;pointer-events:none;border-radius:3px;
 box-shadow:inset 0 0 34px rgba(70,48,20,.55)}
.letter>*{position:relative}
.letter .lh{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:19px;color:#241a0e;text-align:center}
.letter .ls{text-align:center;font-size:12px;font-style:italic;color:#6a4f24;margin:4px 0 6px;line-height:1.5}
.letter p{font-family:'Caveat',cursive;font-size:21px;line-height:1.5;margin:9px 0;color:#36240f}
.letter .lsign{font-family:'Caveat',cursive;font-size:32px;color:#3a1a0c;text-align:right;margin-top:14px}
.sheetimg{margin:20px 14px}
.sheetimg img{display:block;width:100%;height:auto;border-radius:3px;box-shadow:0 14px 40px rgba(0,0,0,.7)}
.sheetcap{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;
 font-size:12.5px;color:#9a8c68;margin-top:8px;line-height:1.5}
.seed{text-align:center;margin:24px 18px 8px;font-family:'Cormorant Garamond',serif;
 font-style:italic;font-size:15px;color:#7c6a44;line-height:1.55}

.foot{text-align:center;font-family:'Cormorant Garamond',serif;font-size:10.5px;
 letter-spacing:2px;text-transform:uppercase;color:#4a4030;padding:26px 20px 16px}
</style>
</head>
<body>
<div class="app">

<!-- ================= ENTRY / TABLE ================= -->
<div class="view on" id="entry">
 <div class="entry-top">
  <div class="entry-kicker" id="eKicker">Clasificado · Caso Blackmoor 1889</div>
  <div class="entry-line" id="eLine">—</div>
  <div class="lang">
   <button id="langEs" class="on">ES</button><span class="sep">·</span><button id="langEn">EN</button>
  </div>
 </div>
 <div class="mesa-wrap">
  <img class="mesa" src="mesa.jpg" alt="">
  <button class="hot decreto" id="hotDecreto"><span class="halo"></span><span class="tag" id="tagDecreto">Decreto Real</span></button>
  <button class="hot informe" id="hotInforme"><span class="halo"></span><span class="tag below" id="tagInforme">Informe de Ashton</span></button>
  <button class="hot archivo" id="hotArchivo"><span class="halo"></span><span class="tag above" id="tagArchivo">Archivo Restringido</span><span class="lock" id="archLock"></span></button>
  <div class="vig"></div>
 </div>
 <div class="dust"></div>
</div>

<!-- ================= DECRETO ================= -->
<div class="view" id="vDecreto">
 <div class="docbar"><button class="back" data-back>‹ <span data-back-label>Volver a la mesa</span></button><div class="dt">I · Decreto</div></div>
 <div class="doc"><div class="sheet" id="decretoSheet"></div></div>
 <div class="dust"></div>
</div>

<!-- ================= INFORME ================= -->
<div class="view" id="vInforme">
 <div class="docbar"><button class="back" data-back>‹ <span data-back-label>Volver a la mesa</span></button><div class="dt">II · Informe</div></div>
 <div class="doc"><div class="sheet report" id="informeSheet"></div></div>
 <div class="dust"></div>
</div>

<!-- ================= ARCHIVO / COFRE ================= -->
<div class="view" id="vArchivo">
 <div class="docbar"><button class="back" data-back>‹ <span data-back-label>Volver a la mesa</span></button><div class="dt">III · Archivo</div></div>
 <div class="arch">
  <div class="arch-inner" id="archLockedView">
   <h2 id="aLockedTitle">Cofre Sellado</h2>
   <div class="note" id="aLockedBody">—</div>
   <div class="cofre-stage" id="cofreStage">
    <img class="cofre-img" src="cofre.jpg" alt="">
    <div class="glowburst"></div>
   </div>
   <div class="symrow" id="symRow"></div>
   <div class="seqdots" id="seqDots"></div>
   <div class="archmsg" id="archMsg"></div>
   <button class="cofre-reset" id="cofreReset">Reiniciar</button>
  </div>
  <div class="reveal" id="archReveal"></div>
 </div>
 <div class="dust"></div>
</div>

</div>
<script>
(function(){
"use strict";

/* ---------------- ICONS ---------------- */
var IC={
 crown:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 8l3.5 3L12 4l5.5 7L21 8l-1.5 11h-15L3 8zm2.6 9h12.8l.5-3.7-2.2 1.9L12 8.6 7.3 15.1 5.1 13.3 5.6 17z"/></svg>',
 back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>',
 lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>',
 check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>'
};
/* symbol shapes */
function poly(n,rot){var p='',cx=12,cy=12,r=9;for(var i=0;i<n;i++){var a=(Math.PI*2*i/n)-Math.PI/2+(rot||0);p+=(i?' ':'')+(cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1);}return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="'+p+'"/></svg>';}
var SYM={
 circulo:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>',
 triangulo:poly(3,0),
 cuadrado:poly(4,Math.PI/4),
 pentagono:poly(5,0),
 hexagono:poly(6,0)
};

/* ---------------- CONTENT ---------------- */
var C={
 es:{
  langName:'ES', back:'Volver a la mesa',
  kicker:'Clasificado · Caso Blackmoor · 1889',
  entryLine:'Mesa del expediente. Documentos compilados por la Oficina de Investigación Especial de la Corona. Toque cualquier pieza para examinarla.',
  labels:{decreto:'Decreto Real',informe:'Informe de Ashton',archivo:'Archivo Restringido'},
  decreto:{
   kicker:'Por la gracia de Dios y la voluntad del Reino',
   title:'Decreto de Investigación Real',
   sub:'Caso Blackmoor',
   body:[
    'Nós, Victoria, por la Gracia de Dios, Reina del Reino Unido de Gran Bretaña e Irlanda, Defensora de la Fe, en uso de las prerrogativas que Nos competen y a través de la Oficina de Investigaciones Especiales,',
    '<b>ORDENAMOS:</b>',
    '<i>Primero.</i> Que se autorice a la presente delegación de investigadores el acceso pleno e inmediato a la comarca de Blackmoor, su parroquia, su posada y cuanta propiedad esté inscrita a nombre de la familia Whateley, incluido sin restricción el mausoleo familiar.',
    '<i>Segundo.</i> Que ninguna autoridad civil, eclesiástica o privada podrá impedir, demorar ni condicionar dicho acceso. Toda obstrucción será tenida por desacato a la Corona.',
    '<i>Tercero.</i> Que los portadores de este Decreto quedan facultados para emplear cuanta fuerza prudente sea menester en defensa de su persona y de la integridad de su misión, e incluso para forzar la entrada del mausoleo si les fuera negada.',
    '<i>Cuarto.</i> Que del resultado de su labor habrán de rendir cuenta directa y reservada al Despacho que suscribe.',
    'Dado en Westminster, en los días corrientes del año del Señor de mil ochocientos ochenta y nueve.'
   ],
   keyLabel:'Fórmula oficial de la Corona',
   keyPhrase:'Lo que la Corona escribe, nadie lo lee dos veces.',
   signature:'Victoria R.', sigRole:'Reina y Defensora de la Fe'
  },
  informe:{
   header:'Informe Preliminar — Caso Blackmoor',
   sub:'Investigador C. Ashton',
   subheader:'Redactado por el Dr. Cornelius Ashton, agente de la Oficina de Investigaciones Especiales. Remitido en agosto de 1889. Considerado parcialmente ilegible.',
   sections:[
    {h:'Llegada al pueblo',b:'Llegué a Blackmoor con luz de tarde y la impresión de haber atravesado una cortina invisible. Los caballos se detuvieron solos antes del puente y costó volver a hacerlos andar. El cochero no quiso seguir. Pagué el doble y tampoco. Entré a pie.'},
    {h:'Primeras observaciones',b:'El pueblo no está vacío. Hay gente. Comen, trabajan, saludan. Pero saludan demasiado tarde, como si tuvieran que recordar que se saluda. La mujer del molinero estuvo dos horas mirando al cielo sin moverse. Cuando le pregunté qué veía, sonrió y dijo: «aún no llega».'},
    {h:'Los desaparecidos',b:'He documentado siete casos en cuatro semanas. Todos vuelven a los tres o cuatro días, exhaustos, con tierra bajo las uñas y sin recuerdos del intervalo. El médico del pueblo los examina y los devuelve a casa sin más. Cuando pregunté por los análisis, respondió que «no hace falta tocar lo que no quiere ser tocado».'},
    {h:'La iglesia',b:'La iglesia está cerrada con cadenas. El párroco abandonó el pueblo hace dos meses. Dejó una nota clavada en la puerta: «Dios ha dejado de escuchar en este lugar». El clavo que la sujetaba se extrajo con dificultad; la madera presentaba marcas de una profundidad incompatible con su grosor.'},
    {h:'Las procesiones',b:'Tres veces, siempre entre la una y las tres de la madrugada, he visto una columna de vecinos atravesar el pueblo hacia el bosque, en dirección a las tierras de Whateley. Llevaban velas. Nadie hablaba. Los seguí hasta el lindero y allí me detuve, porque algo dentro de mí me dijo que un paso más y no volvería siendo el mismo.'},
    {h:'Thomas',b:'El criado de los Whateley, Thomas, me cerró la puerta de la casa al tercer día. Antes había sido cordial. Esa última vez sus ojos no parpadearon mientras hablaba conmigo. Su voz era la suya. Lo demás, no. Tres veces intenté acceder al mausoleo. Tres veces lo impidió.'},

    {h:'Confesión final',emph:true,b:'Llevo once días sin dormir más de tres horas seguidas. Oigo cosas en mi propia habitación. Me cuesta recordar el nombre de mi esposa. Esta mañana me sorprendí escribiendo en este informe palabras que no recuerdo haber pensado, en una caligrafía que no es la mía. He decidido marcharme. Suplico a quien lea esto que no demore la intervención. Ningún hombre debería entrar solo a Blackmoor.'}

   error:'Combinación incorrecta. El cofre permanece cerrado.',

   reset:'Reiniciar',

/* ---------------- STATE ---------------- */
var lang = 'es';
try{ var sl=localStorage.getItem('wh_lang'); if(sl==='es'||sl==='en')lang=sl; }catch(e){}
var unlocked=false;
try{ unlocked = localStorage.getItem('wh_unlocked')==='1'; }catch(e){}

var ORDER=['hexagono','circulo','pentagono','triangulo','cuadrado']; // combinación correcta
var SYMS=['circulo','triangulo','cuadrado','pentagono','hexagono'];   // orden mostrado
var input=[];

/* ---------------- RENDER ---------------- */
function el(id){return document.getElementById(id);}

function renderEntry(){
 var t=C[lang];
 el('eKicker').textContent=t.kicker;
 el('eLine').textContent=t.entryLine;
 el('tagDecreto').textContent=t.labels.decreto;
 el('tagInforme').textContent=t.labels.informe;
 el('tagArchivo').textContent=t.labels.archivo;
 el('langEs').classList.toggle('on',lang==='es');
 el('langEn').classList.toggle('on',lang==='en');
 el('archLock').innerHTML=unlocked?IC.check:IC.lock;
 el('hotArchivo').classList.toggle('done',unlocked);
 [].forEach.call(document.querySelectorAll('[data-back-label]'),function(n){n.textContent=t.back;});
 document.documentElement.lang=lang;
}

function renderDecreto(){
 var d=C[lang].decreto, h='';
 h+='<div class="crest">'+IC.crown+'</div>';
 h+='<div class="kicker">'+d.kicker+'</div>';
 h+='<div class="dtitle serif">'+d.title+'</div>';
 h+='<div class="dsub">'+d.sub+'</div><div class="rule"></div>';
 d.body.forEach(function(p,i){ h+='<p'+(i>1?' class="indent"':'')+'>'+p+'</p>'; });
 h+='<div class="keybox"><div class="lbl">'+d.keyLabel+'</div><div class="phrase">'+d.keyPhrase+'</div></div>';
 h+='<div class="wax">'+IC.crown+'</div>';
 h+='<div class="sign"><div class="nm">'+d.signature+'</div><div class="rl">'+d.sigRole+'</div></div>';
 el('decretoSheet').innerHTML=h;
}

function renderInforme(){
 var r=C[lang].informe, h='';
 h+='<div class="dtitle serif" style="font-size:23px">'+r.header+'</div>';
 h+='<div class="dsub">'+r.sub+'</div>';
 h+='<div class="kicker" style="font-size:12.5px;margin-top:8px">'+r.subheader+'</div>';
 h+='<div class="rule"></div>';
 r.sections.forEach(function(s){
  h+='<div class="seg'+(s.emph?' emph':'')+'"><div class="sh">'+s.h+'</div><p>'+s.b+'</p></div>';
 });
 h+='<div class="closing">'+r.closing+'</div>';
 h+='<div class="sign"><div class="nm">'+r.signature+'</div></div>';
 el('informeSheet').innerHTML=h;
}

function renderArchivo(){
 var a=C[lang].archivo;
 el('aLockedTitle').textContent=a.lockedTitle;
 el('aLockedBody').textContent=a.lockedBody;
 el('cofreReset').textContent=a.reset;
 // symbols
 var sr=el('symRow'); sr.innerHTML='';
 SYMS.forEach(function(name){
  var b=document.createElement('button');
  b.className='sym'; b.setAttribute('data-sym',name);
  b.innerHTML=SYM[name];
  b.addEventListener('click',function(){ pressSym(name,b); });
  sr.appendChild(b);
 });
 var sd=el('seqDots'); sd.innerHTML=''; for(var i=0;i<5;i++)sd.appendChild(document.createElement('i'));
 el('archMsg').textContent=''; el('archMsg').className='archmsg';
 // reveal
 renderReveal();
 if(unlocked){ showReveal(false); } else { el('archLockedView').style.display='block'; el('archReveal').classList.remove('on'); }
}

function renderReveal(){
 var a=C[lang].archivo, h='';
 h+='<div class="letter">';
 h+='<div class="lh">'+a.letterHeader+'</div><div class="ls">'+a.letterSub+'</div>';
 a.letterBody.forEach(function(p){ h+='<p>'+p+'</p>'; });
 h+='<div class="lsign">'+a.letterSign+'</div></div>';
 h+='<div class="sheetimg"><img src="hoja.jpg" alt=""><div class="sheetcap">'+a.sheetHeader+' — '+a.sheetCap+'</div></div>';
 h+='<div class="seed">'+a.seed+'</div>';
 h+='<div class="foot">The Works of Madness · Expediente Whateley</div>';
 el('archReveal').innerHTML=h;
}

/* ---------------- COFRE LOGIC ---------------- */
function pressSym(name,btn){
 if(unlocked) return;
 btn.classList.add('lit');
 input.push(name);
 var dots=el('seqDots').children;
 if(input.length<=5) dots[input.length-1].classList.add('fill');
 if(input.length===5){
  var ok=ORDER.every(function(s,i){return input[i]===s;});
  setTimeout(function(){ ok?openCofre():failCofre(); },360);
 }
}
function clearSeq(){
 input=[];
 [].forEach.call(el('symRow').children,function(b){b.classList.remove('lit');});
 [].forEach.call(el('seqDots').children,function(d){d.classList.remove('fill');});
}
function failCofre(){
 var a=C[lang].archivo;
 var st=el('cofreStage'); st.classList.add('shake');
 if(navigator.vibrate)navigator.vibrate([60,40,60]);
 var m=el('archMsg'); m.textContent=a.error; m.className='archmsg err';
 setTimeout(function(){ st.classList.remove('shake'); clearSeq(); },650);
}
function openCofre(){
 var a=C[lang].archivo;
 unlocked=true; try{localStorage.setItem('wh_unlocked','1');}catch(e){}
 el('cofreStage').classList.add('opened');
 var m=el('archMsg'); m.textContent=a.success; m.className='archmsg ok';
 if(navigator.vibrate)navigator.vibrate(30);
 setTimeout(function(){ showReveal(true); renderEntry(); },1400);
}
function showReveal(anim){
 el('archLockedView').style.display='none';
 el('archReveal').classList.add('on');
 window.scrollTo(0,0);
}
el('cofreReset').addEventListener('click',function(){
 clearSeq(); el('archMsg').textContent=''; el('archMsg').className='archmsg';
});

/* ---------------- NAVIGATION ---------------- */
var VIEWS=['entry','vDecreto','vInforme','vArchivo'];
function show(id){
 VIEWS.forEach(function(v){ el(v).classList.toggle('on',v===id); });
 window.scrollTo(0,0);
}
el('hotDecreto').addEventListener('click',function(){ renderDecreto(); show('vDecreto'); });
el('hotInforme').addEventListener('click',function(){ renderInforme(); show('vInforme'); });
el('hotArchivo').addEventListener('click',function(){ clearSeq(); renderArchivo(); show('vArchivo'); });
[].forEach.call(document.querySelectorAll('[data-back]'),function(b){
 b.addEventListener('click',function(){ renderEntry(); show('entry'); });
});

/* language */
function setLang(l){
 lang=l; try{localStorage.setItem('wh_lang',l);}catch(e){}
 renderEntry(); renderDecreto(); renderInforme(); renderArchivo();
}
el('langEs').addEventListener('click',function(){ setLang('es'); });
el('langEn').addEventListener('click',function(){ setLang('en'); });

/* ---------------- INIT ---------------- */
renderEntry(); renderDecreto(); renderInforme(); renderArchivo();
})();
</script>
</body>
</html>
